name: Package Integration Tests

permissions:
  actions: write
  contents: read

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

jobs:
  pack:
    name: Pack QuestPDF
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      package-version: ${{ steps.version.outputs.package-version }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Create package version
        id: version
        shell: bash
        run: |
          base_version="$(grep -m1 '<Version>' Source/QuestPDF/QuestPDF.csproj | sed -E 's/.*<Version>([^<]+)<.*/\1/')"
          echo "package-version=${base_version}-ci.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10.0 SDK
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 10.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Build package
        shell: bash
        run: |
          mkdir -p artifacts/nupkg
          dotnet build Source/QuestPDF/QuestPDF.csproj \
            --configuration Release \
            -p:BUILD_PACKAGE=true \
            -p:Version="${{ steps.version.outputs.package-version }}" \
            -p:PackageVersion="${{ steps.version.outputs.package-version }}" \
            -p:PackageOutputPath="$PWD/artifacts/nupkg" \
            -p:WarningLevel=0

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: questpdf-integration-package
          path: artifacts/nupkg/*.nupkg

  full:
    name: ${{ matrix.runtime.name }} + dotnet ${{ matrix.dotnet-version }}
    needs: pack
    runs-on: ${{ matrix.runtime.runs-on }}
    container: ${{ matrix.runtime.container }}
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: win-x64
            runs-on: windows-latest
          - name: win-x86
            runs-on: windows-latest
          - name: win-arm64
            runs-on: windows-11-arm
          - name: linux-x64
            runs-on: ubuntu-latest
            container: ubuntu:24.04
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            container: ubuntu:24.04
          - name: linux-musl-x64
            runs-on: ubuntu-latest
            container: alpine:3.22
          - name: osx-x64
            runs-on: macos-26-intel
          - name: osx-arm64
            runs-on: macos-latest
        dotnet-version: [ '6.0', '8.0', '10.0' ]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Ubuntu prerequisites
        if: matrix.runtime.name == 'linux-x64' || matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          apt update --yes
          apt install --yes bash curl ca-certificates clang zlib1g-dev nodejs npm

      - name: Install Alpine prerequisites
        if: matrix.runtime.name == 'linux-musl-x64'
        shell: sh
        run: |
          apk update
          apk add bash curl ca-certificates clang build-base zlib-dev libstdc++ libgcc tar gzip nodejs npm

      - name: Setup .NET SDK (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: pwsh
        run: |
          $arch = "${{ matrix.runtime.name }}".Replace("win-", "")
          $script = "$env:RUNNER_TEMP\dotnet-install.ps1"
          $installDir = "$env:RUNNER_TEMP\dotnet-$arch-${{ matrix.dotnet-version }}"
          Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile $script
          & $script -Channel "${{ matrix.dotnet-version }}" -Architecture $arch -InstallDir $installDir
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"

      - name: Setup .NET SDK (Unix)
        if: startsWith(matrix.runtime.name, 'win-') == false
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel "${{ matrix.dotnet-version }}" --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Install zx
        shell: bash
        run: npm install --global zx@8

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: questpdf-integration-package
          path: artifacts/nupkg

      - name: Clear NuGet caches
        shell: bash
        run: dotnet nuget locals all --clear

      - name: Publish and run published outputs
        shell: bash
        run: zx Tests/IntegrationTests/scripts/run-published-suite.mjs "net${{ matrix.dotnet-version }}" "${{ matrix.runtime.name }}" "${{ needs.pack.outputs.package-version }}"

      - name: Upload integration output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: out-${{ matrix.runtime.name }}-net${{ matrix.dotnet-version }}
          path: artifacts/integration-output/**

  netframework:
    name: win-${{ matrix.platform-target }} + ${{ matrix.target-framework }}
    needs: pack
    runs-on: windows-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        target-framework: [ 'net472', 'net481' ]
        platform-target: [ 'x64', 'x86', 'AnyCPU' ]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        shell: pwsh
        run: |
          $script = "$env:RUNNER_TEMP\dotnet-install.ps1"
          $installDir = "$env:RUNNER_TEMP\dotnet"
          Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile $script
          & $script -Channel 10.0 -InstallDir $installDir
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"

      - name: Install zx
        shell: bash
        run: npm install --global zx@8

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: questpdf-integration-package
          path: artifacts/nupkg

      - name: Clear NuGet caches
        shell: bash
        run: dotnet nuget locals all --clear

      - name: Build and run .NET Framework output
        shell: bash
        run: zx Tests/IntegrationTests/scripts/run-netframework-test.mjs "${{ needs.pack.outputs.package-version }}" "${{ matrix.target-framework }}" "${{ matrix.platform-target }}"

      - name: Upload integration output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: out-netframework-${{ matrix.target-framework }}-${{ matrix.platform-target }}
          path: artifacts/integration-output/**

  merge-output-artifacts:
    name: Merge integration output artifacts
    needs: [ full, netframework ]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10

    steps:
      - name: Merge integration output artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-integration-output
          pattern: out-*
          separate-directories: true
          delete-merged: true
