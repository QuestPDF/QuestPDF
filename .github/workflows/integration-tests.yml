name: Package Integration Tests

permissions: {}

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

jobs:
  pack:
    name: Pack QuestPDF
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      package-version: ${{ steps.version.outputs.package-version }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Create package version
        id: version
        shell: bash
        run: |
          base_version="$(grep -m1 '<Version>' Source/QuestPDF/QuestPDF.csproj | sed -E 's/.*<Version>([^<]+)<.*/\1/')"
          echo "package-version=${base_version}-ci.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10.0 SDK
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 10.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Build package
        shell: bash
        run: |
          mkdir -p artifacts/nupkg
          dotnet build Source/QuestPDF/QuestPDF.csproj \
            --configuration Release \
            -p:BUILD_PACKAGE=true \
            -p:Version="${{ steps.version.outputs.package-version }}" \
            -p:PackageVersion="${{ steps.version.outputs.package-version }}" \
            -p:PackageOutputPath="$PWD/artifacts/nupkg" \
            -p:WarningLevel=0

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: questpdf-integration-package
          path: artifacts/nupkg/*.nupkg

  smoke:
    name: Smoke / ${{ matrix.runtime.name }} / .NET ${{ matrix.dotnet-version }} / ${{ matrix.app }}
    if: github.event_name == 'pull_request'
    needs: pack
    runs-on: ${{ matrix.runtime.runs-on }}
    container: ${{ matrix.runtime.container }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: win-x64
            runs-on: windows-latest
          - name: linux-x64
            runs-on: ubuntu-latest
            container: ubuntu:24.04
          - name: osx-arm64
            runs-on: macos-latest
        dotnet-version: [ '10.0' ]
        app: [ console, console-aot ]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install container prerequisites
        if: matrix.runtime.name == 'linux-x64'
        shell: bash
        run: |
          apt update --yes
          apt install --yes bash curl ca-certificates clang zlib1g-dev

      - name: Setup .NET SDK (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: pwsh
        run: |
          $arch = "${{ matrix.runtime.name }}".Replace("win-", "")
          $script = "$env:RUNNER_TEMP\dotnet-install.ps1"
          $installDir = "$env:RUNNER_TEMP\dotnet-$arch-${{ matrix.dotnet-version }}"
          Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile $script
          & $script -Channel "${{ matrix.dotnet-version }}" -Architecture $arch -InstallDir $installDir
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"

      - name: Setup .NET SDK (Unix)
        if: startsWith(matrix.runtime.name, 'win-') == false
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel "${{ matrix.dotnet-version }}" --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: questpdf-integration-package
          path: artifacts/nupkg

      - name: Clear NuGet caches
        shell: bash
        run: dotnet nuget locals all --clear

      - name: Publish and run published output
        shell: bash
        run: Tests/IntegrationTests/scripts/run-published-test.sh "${{ matrix.app }}" "net${{ matrix.dotnet-version }}" "${{ matrix.runtime.name }}" "${{ needs.pack.outputs.package-version }}"

      - name: Upload integration output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: questpdf-integration-smoke-${{ matrix.runtime.name }}-net${{ matrix.dotnet-version }}-${{ matrix.app }}
          path: artifacts/integration/**

  full:
    name: Full / ${{ matrix.runtime.name }} / .NET ${{ matrix.dotnet-version }} / ${{ matrix.app }}
    if: github.event_name != 'pull_request'
    needs: pack
    runs-on: ${{ matrix.runtime.runs-on }}
    container: ${{ matrix.runtime.container }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: win-x64
            runs-on: windows-latest
          - name: win-x86
            runs-on: windows-latest
          - name: win-arm64
            runs-on: windows-11-arm
          - name: linux-x64
            runs-on: ubuntu-latest
            container: ubuntu:24.04
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            container: ubuntu:24.04
          - name: linux-musl-x64
            runs-on: ubuntu-latest
            container: alpine:3.22
          - name: osx-x64
            runs-on: macos-26-intel
          - name: osx-arm64
            runs-on: macos-latest
        dotnet-version: [ '6.0', '8.0', '10.0' ]
        app: [ console, console-aot, console-singlefile, webapi, worker ]
        exclude:
          - dotnet-version: '6.0'
            app: console-aot
          - runtime:
              name: win-x86
              runs-on: windows-latest
            app: console-aot

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Ubuntu prerequisites
        if: matrix.runtime.name == 'linux-x64' || matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          apt update --yes
          apt install --yes bash curl ca-certificates clang zlib1g-dev

      - name: Install Alpine prerequisites
        if: matrix.runtime.name == 'linux-musl-x64'
        shell: sh
        run: |
          apk update
          apk add bash curl ca-certificates clang build-base zlib-dev libstdc++ libgcc tar gzip

      - name: Setup .NET SDK (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: pwsh
        run: |
          $arch = "${{ matrix.runtime.name }}".Replace("win-", "")
          $script = "$env:RUNNER_TEMP\dotnet-install.ps1"
          $installDir = "$env:RUNNER_TEMP\dotnet-$arch-${{ matrix.dotnet-version }}"
          Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile $script
          & $script -Channel "${{ matrix.dotnet-version }}" -Architecture $arch -InstallDir $installDir
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"

      - name: Setup .NET SDK (Unix)
        if: startsWith(matrix.runtime.name, 'win-') == false
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel "${{ matrix.dotnet-version }}" --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: questpdf-integration-package
          path: artifacts/nupkg

      - name: Clear NuGet caches
        shell: bash
        run: dotnet nuget locals all --clear

      - name: Publish and run published output
        shell: bash
        run: Tests/IntegrationTests/scripts/run-published-test.sh "${{ matrix.app }}" "net${{ matrix.dotnet-version }}" "${{ matrix.runtime.name }}" "${{ needs.pack.outputs.package-version }}"

      - name: Upload integration output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: questpdf-integration-full-${{ matrix.runtime.name }}-net${{ matrix.dotnet-version }}-${{ matrix.app }}
          path: artifacts/integration/**

  netframework:
    name: .NET Framework net472
    if: github.event_name != 'pull_request'
    needs: pack
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        shell: pwsh
        run: |
          $script = "$env:RUNNER_TEMP\dotnet-install.ps1"
          $installDir = "$env:RUNNER_TEMP\dotnet"
          Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile $script
          & $script -Channel 10.0 -InstallDir $installDir
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: questpdf-integration-package
          path: artifacts/nupkg

      - name: Clear NuGet caches
        shell: pwsh
        run: dotnet nuget locals all --clear

      - name: Build and run .NET Framework output
        shell: pwsh
        run: Tests/IntegrationTests/scripts/run-netframework-test.ps1 -PackageVersion "${{ needs.pack.outputs.package-version }}"

      - name: Upload integration output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: questpdf-integration-netframework-net472
          path: artifacts/integration/**
